<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matthew Ho — Senior Creative</title>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#F0EFEA; --black:#111111; --orange:#E85C1A; --gray-mid:#C8C7C0; --gray-dark:#555550; --white:#FFFFFF; --nav-h:72px; }
  html { scroll-behavior: smooth; }
  body { background:var(--bg); color:var(--black); font-family:'DM Sans',sans-serif; font-size:16px; line-height:1.6; overflow-x:hidden; }

  nav { position:fixed; top:0; left:0; right:0; height:var(--nav-h); display:flex; align-items:center; justify-content:space-between; padding:0 48px; background:var(--bg); border-bottom:1.5px solid var(--black); z-index:100; }
  .nav-logo { font-family:'Caprasimo',cursive; font-size:26px; color:var(--black); text-decoration:none; }
  .nav-logo span { color:var(--orange); }
  .nav-links { display:flex; gap:36px; list-style:none; }
  .nav-links a { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--black); text-decoration:none; position:relative; padding-bottom:2px; }
  .nav-links a::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:var(--orange); transition:width 0.25s ease; }
  .nav-links a:hover::after { width:100%; }

  .hero-strip { margin-top:var(--nav-h); padding:32px 48px 20px; display:flex; align-items:center; gap:16px; border-bottom:1px solid var(--gray-mid); flex-wrap:wrap; }
  .hero-strip .tagline { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:300; letter-spacing:0.14em; text-transform:uppercase; color:var(--gray-dark); }
  .hero-strip .dot { width:7px; height:7px; border-radius:50%; background:var(--orange); flex-shrink:0; }

  #work { padding:48px 48px 80px; }
  .section-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray-dark); margin-bottom:32px; display:flex; align-items:center; gap:12px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--gray-mid); }

  .project-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:20px; }

  .project-card { border-radius:20px; overflow:hidden; cursor:pointer; position:relative; text-decoration:none; display:block; background:var(--white); }
  .project-card.featured { grid-column:span 7; }
  .project-card.tall     { grid-column:span 5; }
  .project-card.half     { grid-column:span 6; }
  .project-card.third    { grid-column:span 4; }

  .card-visual { position:relative; overflow:hidden; }
  .card-hover-overlay { position:absolute; inset:0; background:var(--orange); opacity:0; transition:opacity 0.3s ease; z-index:2; pointer-events:none; }
  .project-card:hover .card-hover-overlay { opacity:0.32; }

  .card-placeholder { width:100%; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .card-placeholder.r169 { aspect-ratio:16/9; }
  .card-placeholder.r45  { aspect-ratio:4/5; }
  .card-placeholder.rsq  { aspect-ratio:1/1; }
  .placeholder-brand { font-family:'Caprasimo',cursive; color:rgba(255,255,255,0.12); font-size:clamp(24px,4vw,60px); user-select:none; text-align:center; padding:20px; position:relative; z-index:1; }
  .placeholder-accent { position:absolute; bottom:-20px; right:-20px; width:110px; height:110px; border-radius:50%; background:var(--orange); opacity:0.28; }
  .card-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }

  .card-body { padding:20px 24px 24px; }
  .card-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
  .card-brand { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--orange); font-weight:500; }
  .award-badge { background:var(--black); color:var(--bg); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; padding:4px 10px; border-radius:100px; white-space:nowrap; flex-shrink:0; }
  .card-title { font-size:18px; font-weight:700; line-height:1.25; color:var(--black); margin-bottom:8px; }
  .card-desc { font-size:13px; color:var(--gray-dark); line-height:1.5; font-weight:300; }
  .card-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .tag { font-size:11px; font-family:'DM Mono',monospace; padding:4px 10px; border-radius:100px; border:1px solid var(--gray-mid); color:var(--gray-dark); }

  #about { border-top:1.5px solid var(--black); padding:80px 48px; background:var(--black); color:var(--bg); }
  .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:start; }
  .section-label-dark { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--orange); margin-bottom:32px; }
  .about-headline { font-family:'Caprasimo',cursive; font-size:clamp(28px,3.5vw,48px); line-height:1.1; color:var(--bg); margin-bottom:28px; }
  .about-headline span { color:var(--orange); }
  .about-body { font-size:15px; font-weight:300; color:#C8C7C0; line-height:1.8; margin-bottom:16px; }
  .contact-line { margin-top:36px; display:flex; flex-direction:column; gap:8px; }
  .contact-line a { font-family:'DM Mono',monospace; font-size:13px; color:var(--orange); text-decoration:none; display:flex; align-items:center; gap:8px; transition:letter-spacing 0.2s ease; }
  .contact-line a:hover { letter-spacing:0.04em; }
  .contact-line a::before { content:'→'; }

  .exp-list { list-style:none; }
  .exp-item { padding:20px 0; border-bottom:1px solid rgba(200,199,192,0.15); display:grid; grid-template-columns:1fr auto; gap:16px; align-items:start; }
  .exp-item:last-child { border-bottom:none; }
  .exp-company { font-size:16px; font-weight:700; color:var(--bg); margin-bottom:2px; }
  .exp-role { font-size:13px; font-weight:300; color:var(--gray-mid); }
  .exp-clients { font-size:12px; font-weight:300; color:#666660; margin-top:3px; }
  .exp-year { font-family:'DM Mono',monospace; font-size:11px; color:var(--orange); letter-spacing:0.06em; white-space:nowrap; padding-top:4px; }

  /* AWARDS — compact text list */
  .awards-section { padding:72px 48px; background:var(--bg); border-top:1.5px solid var(--black); }
  .awards-headline { font-family:'Caprasimo',cursive; font-size:clamp(26px,3vw,40px); color:var(--black); margin-bottom:40px; }
  .awards-headline span { color:var(--orange); }
  .awards-year-group { margin-bottom:28px; }
  .awards-year-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--orange); margin-bottom:8px; }
  .award-row { display:grid; grid-template-columns:100px 1fr auto; gap:16px; align-items:baseline; padding:8px 0; border-bottom:1px solid var(--gray-mid); font-size:13px; }
  .award-row:last-child { border-bottom:none; }
  .award-tier { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.05em; }
  .tier-gold   { color:#A07800; }
  .tier-silver { color:#777770; }
  .tier-bronze { color:#9B5D1E; }
  .tier-other  { color:var(--gray-dark); }
  .award-info { color:var(--black); line-height:1.4; }
  .award-info strong { font-weight:600; }
  .award-info-sub { font-size:12px; color:var(--gray-dark); }
  .award-brand-pill { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--orange); white-space:nowrap; }

  footer { background:var(--black); color:var(--gray-mid); padding:28px 48px; display:flex; align-items:center; justify-content:space-between; font-size:12px; font-family:'DM Mono',monospace; border-top:1px solid rgba(200,199,192,0.15); }
  .footer-logo { font-family:'Caprasimo',cursive; font-size:18px; color:var(--bg); }
  .footer-logo span { color:var(--orange); }

  .reveal { opacity:0; transform:translateY(24px); transition:opacity 0.55s ease,transform 0.55s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }

  @media(max-width:900px){
    nav{padding:0 24px;}
    #work,.awards-section{padding:32px 24px 60px;}
    #about{padding:60px 24px;}
    footer{padding:20px 24px;flex-direction:column;gap:8px;text-align:center;}
    .project-card.featured,.project-card.tall,.project-card.half,.project-card.third{grid-column:span 12;}
    .about-grid{grid-template-columns:1fr;gap:48px;}
    .hero-strip{padding:20px 24px;}
    .award-row{grid-template-columns:80px 1fr;}
    .award-brand-pill{display:none;}
  }
</style>
</head>
<body>

<nav>
  <a href="#work" class="nav-logo" id="nav-name"></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#work">Work</a></li>
  </ul>
</nav>

<div class="hero-strip">
  <span class="tagline" id="hero-title"></span>
  <div class="dot"></div>
  <span class="tagline" id="hero-tagline"></span>
  <div class="dot"></div>
  <span class="tagline" id="hero-awards"></span>
</div>

<section id="work">
  <p class="section-label">Selected Work</p>
  <div class="project-grid" id="project-grid"></div>
</section>

<section id="about">
  <div class="about-grid">
    <div class="about-left reveal">
      <p class="section-label-dark">About</p>
      <h2 class="about-headline">A strategist's brain<span>.</span><br>A writer's instinct<span>.</span></h2>
      <div id="about-bio"></div>
      <div class="contact-line" id="contact-line"></div>
    </div>
    <div class="about-right reveal" style="transition-delay:0.15s">
      <p class="section-label-dark">Experience</p>
      <ul class="exp-list" id="exp-list"></ul>
    </div>
  </div>
</section>

<section class="awards-section">
  <div class="reveal">
    <h2 class="awards-headline">Recognition<span>.</span></h2>
  </div>
  <div id="awards-container"></div>
</section>

<footer>
  <span class="footer-logo" id="footer-logo"></span>
  <span id="footer-contact"></span>
  <span id="footer-year"></span>
</footer>

<script src="data.js"></script>
<script>
const D = PORTFOLIO_DATA;

// Helpers
const $ = id => document.getElementById(id);
const tierCls = t => { const l=t.toLowerCase(); return l==='gold'?'tier-gold':l==='silver'?'tier-silver':l==='bronze'?'tier-bronze':'tier-other'; };
const aspectMap = { featured:'r169', tall:'r45', half:'r169', third:'rsq' };

// NAV / STRIP / FOOTER
$('nav-name').innerHTML = D.name + '<span>.</span>';
$('hero-title').textContent = D.title + ' · ' + D.location;
$('hero-tagline').textContent = D.tagline;
$('hero-awards').textContent = D.awardStrip;
$('footer-logo').innerHTML = D.name + '<span>.</span>';
$('footer-contact').textContent = D.title + ' · ' + D.location + ' · ' + D.email;
$('footer-year').textContent = '© ' + new Date().getFullYear();

// BIO
D.bio.forEach(p => {
  const el = document.createElement('p');
  el.className = 'about-body';
  el.textContent = p;
  $('about-bio').appendChild(el);
});

// CONTACT
[
  {href:'mailto:'+D.email, text:D.email},
  {href:'tel:'+D.phone.replace(/\s/g,''), text:D.phone},
  {href:'https://'+D.website, text:D.website, blank:true}
].forEach(c => {
  const a = document.createElement('a');
  a.href = c.href; a.textContent = c.text;
  if(c.blank) a.target = '_blank';
  $('contact-line').appendChild(a);
});

// EXPERIENCE
D.experience.forEach(e => {
  $('exp-list').innerHTML += `<li class="exp-item">
    <div>
      <p class="exp-company">${e.company}</p>
      <p class="exp-role">${e.role}</p>
      <p class="exp-clients">${e.clients}</p>
    </div>
    <span class="exp-year">${e.period}</span>
  </li>`;
});

// PROJECTS
const grid = $('project-grid');
D.projects.forEach((p, i) => {
  const asp = aspectMap[p.gridClass] || 'r169';
  const delay = (i % 3) * 0.08;
  const firstImg = p.collaterals && p.collaterals.find(c => c.type==='image' && c.url);
  const visual = firstImg
    ? `<img class="card-img" src="${firstImg.url}" alt="${p.title}" loading="lazy">`
    : `<span class="placeholder-brand">${p.brand}</span><div class="placeholder-accent"></div>`;
  grid.innerHTML += `
    <a class="project-card ${p.gridClass} reveal" href="work.html?id=${p.id}" style="transition-delay:${delay}s">
      <div class="card-visual">
        <div class="card-placeholder ${asp}" style="background:${p.placeholderColor}">${visual}</div>
        <div class="card-hover-overlay"></div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-brand">${p.brand}</span>
          ${p.award ? `<span class="award-badge">${p.award}</span>` : ''}
        </div>
        <p class="card-title">${p.title}</p>
        <p class="card-desc">${p.description}</p>
        <div class="card-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </a>`;
});

// AWARDS — grouped by year desc
const byYear = {};
D.awards.forEach(a => { if(!byYear[a.year]) byYear[a.year]=[]; byYear[a.year].push(a); });
const awardsEl = $('awards-container');
Object.keys(byYear).sort((a,b)=>b-a).forEach(yr => {
  const g = document.createElement('div');
  g.className = 'awards-year-group reveal';
  g.innerHTML = `<p class="awards-year-label">${yr}</p>` +
    byYear[yr].map(a=>`<div class="award-row">
      <span class="award-tier ${tierCls(a.tier)}">${a.tier}</span>
      <span class="award-info"><strong>${a.show}</strong><span class="award-info-sub"> — ${a.category}</span></span>
      ${a.brand?`<span class="award-brand-pill">${a.brand}</span>`:'<span></span>'}
    </div>`).join('');
  awardsEl.appendChild(g);
});

// REVEAL
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);} });
}, {threshold:0.08});
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
</body>
</html>
