<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Matthew Ho</title>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#F0EFEA; --black:#111111; --orange:#E85C1A; --gray-mid:#C8C7C0; --gray-dark:#555550; --white:#FFFFFF; --nav-h:72px; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--black); font-family:'DM Sans',sans-serif; font-size:16px; line-height:1.6; overflow-x:hidden; }

  nav { position:fixed; top:0; left:0; right:0; height:var(--nav-h); display:flex; align-items:center; justify-content:space-between; padding:0 48px; background:var(--bg); border-bottom:1.5px solid var(--black); z-index:100; }
  .nav-logo { font-family:'Caprasimo',cursive; font-size:26px; color:var(--black); text-decoration:none; }
  .nav-logo span { color:var(--orange); }
  .nav-back { font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--black); text-decoration:none; display:flex; align-items:center; gap:8px; transition:color 0.2s; }
  .nav-back::before { content:'←'; }
  .nav-back:hover { color:var(--orange); }

  .work-hero { margin-top:var(--nav-h); padding:64px 48px 48px; border-bottom:1px solid var(--gray-mid); }
  .work-meta { display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
  .work-brand { font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); font-weight:500; }
  .work-award-pill { background:var(--black); color:var(--bg); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:5px 12px; border-radius:100px; }
  .work-title { font-family:'Caprasimo',cursive; font-size:clamp(32px,5vw,64px); line-height:1.05; color:var(--black); margin-bottom:16px; }
  .work-subtitle { font-size:18px; font-weight:300; color:var(--gray-dark); max-width:640px; margin-bottom:28px; }
  .work-tags { display:flex; flex-wrap:wrap; gap:8px; }
  .tag { font-size:11px; font-family:'DM Mono',monospace; padding:5px 12px; border-radius:100px; border:1px solid var(--gray-mid); color:var(--gray-dark); }

  .work-content { padding:64px 48px; }

  /* VIDEO */
  .video-block { margin-bottom:64px; }
  .video-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:16px; }
  .video-wrap { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:20px; background:var(--black); }
  .video-wrap iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:0; border-radius:20px; }
  .video-wrap video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; border-radius:20px; }
  .video-caption { font-size:13px; color:var(--gray-dark); margin-top:12px; font-weight:300; }

  /* COLLATERALS */
  .collaterals-block { }
  .collaterals-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:24px; }
  .collaterals-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px; }
  .collateral-item { border-radius:16px; overflow:hidden; background:var(--black); position:relative; }
  .collateral-item img { width:100%; height:100%; object-fit:cover; display:block; }
  .collateral-item.portrait { aspect-ratio:4/5; }
  .collateral-item.landscape { aspect-ratio:16/9; }
  .collateral-item.square { aspect-ratio:1/1; }
  .collateral-item video { width:100%; display:block; }
  .col-caption { font-size:12px; color:var(--gray-dark); margin-top:8px; font-weight:300; font-family:'DM Mono',monospace; letter-spacing:0.04em; }
  .col-placeholder { width:100%; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; background:var(--black); color:rgba(255,255,255,0.15); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.1em; border-radius:16px; }

  /* DESCRIPTION */
  .desc-block { max-width:680px; margin-bottom:64px; }
  .desc-text { font-size:17px; font-weight:300; line-height:1.85; color:var(--black); }

  /* NEXT PROJECT */
  .next-project { padding:64px 48px; border-top:1.5px solid var(--black); background:var(--black); }
  .next-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--orange); margin-bottom:20px; }
  .next-link { text-decoration:none; display:inline-flex; align-items:baseline; gap:16px; }
  .next-title { font-family:'Caprasimo',cursive; font-size:clamp(24px,3.5vw,44px); color:var(--bg); transition:color 0.2s; }
  .next-link:hover .next-title { color:var(--orange); }
  .next-arrow { font-size:clamp(24px,3.5vw,44px); color:var(--orange); }

  footer { background:var(--black); color:var(--gray-mid); padding:28px 48px; display:flex; align-items:center; justify-content:space-between; font-size:12px; font-family:'DM Mono',monospace; border-top:1px solid rgba(200,199,192,0.15); }
  .footer-logo { font-family:'Caprasimo',cursive; font-size:18px; color:var(--bg); }
  .footer-logo span { color:var(--orange); }

  .not-found { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; text-align:center; }
  .not-found h2 { font-family:'Caprasimo',cursive; font-size:40px; }
  .not-found a { font-family:'DM Mono',monospace; font-size:13px; color:var(--orange); text-decoration:none; }

  @media(max-width:900px){
    nav{padding:0 24px;}
    .work-hero,.work-content{padding:40px 24px;}
    .next-project{padding:48px 24px;}
    footer{padding:20px 24px;flex-direction:column;gap:8px;text-align:center;}
    .collaterals-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Matthew Ho<span>.</span></a>
  <a href="index.html#work" class="nav-back">All Work</a>
</nav>

<div id="page-root"></div>

<footer>
  <span class="footer-logo">Matthew Ho<span>.</span></span>
  <span id="footer-contact"></span>
  <span id="footer-year"></span>
</footer>

<script src="data.js"></script>
<script>
const D = PORTFOLIO_DATA;
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const idx = D.projects.findIndex(p => p.id === id);
const project = D.projects[idx];
const root = document.getElementById('page-root');

document.getElementById('footer-contact').textContent = D.email;
document.getElementById('footer-year').textContent = '© ' + new Date().getFullYear();

if (!project) {
  root.innerHTML = `<div class="not-found" style="margin-top:72px"><h2>Project not found<span style="color:var(--orange)">.</span></h2><a href="index.html#work">← Back to all work</a></div>`;
} else {
  document.title = project.title + ' — Matthew Ho';

  // Build video embed
  let videoHTML = '';
  if (project.videoUrl) {
    let embedSrc = '';
    if (project.videoType === 'youtube') {
      const ytId = extractYouTubeId(project.videoUrl);
      if (ytId) embedSrc = `https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1`;
    } else if (project.videoType === 'vimeo') {
      const vmId = project.videoUrl.match(/vimeo\.com\/(\d+)/);
      if (vmId) embedSrc = `https://player.vimeo.com/video/${vmId[1]}?byline=0&portrait=0&title=0`;
    }
    if (embedSrc) {
      videoHTML = `<div class="video-block">
        <p class="video-label">Campaign Video</p>
        <div class="video-wrap"><iframe src="${embedSrc}" allowfullscreen loading="lazy"></iframe></div>
        ${project.videoCaption ? `<p class="video-caption">${project.videoCaption}</p>` : ''}
      </div>`;
    } else if (project.videoType === 'file') {
      videoHTML = `<div class="video-block">
        <p class="video-label">Campaign Video</p>
        <div class="video-wrap"><video src="${project.videoUrl}" controls playsinline></video></div>
      </div>`;
    }
  }

  // Build collaterals
  let colHTML = '';
  const cols = (project.collaterals || []).filter(c => c.url);
  if (cols.length) {
    colHTML = `<div class="collaterals-block">
      <p class="collaterals-label">Campaign Collaterals</p>
      <div class="collaterals-grid">
        ${cols.map(c => {
          const orient = c.orientation || 'landscape';
          if (c.type === 'image') {
            return `<div><div class="collateral-item ${orient}"><img src="${c.url}" alt="${c.caption||''}" loading="lazy"></div>${c.caption?`<p class="col-caption">${c.caption}</p>`:''}</div>`;
          } else if (c.type === 'gif') {
            return `<div><div class="collateral-item ${orient}"><img src="${c.url}" alt="${c.caption||''}" loading="lazy"></div>${c.caption?`<p class="col-caption">${c.caption}</p>`:''}</div>`;
          } else if (c.type === 'video') {
            return `<div><div class="collateral-item ${orient}"><video src="${c.url}" autoplay muted loop playsinline></video></div>${c.caption?`<p class="col-caption">${c.caption}</p>`:''}</div>`;
          }
          return '';
        }).join('')}
      </div>
    </div>`;
  }

  // Next project
  const nextProject = D.projects[(idx + 1) % D.projects.length];
  const nextHTML = `<div class="next-project">
    <p class="next-label">Next Project</p>
    <a class="next-link" href="work.html?id=${nextProject.id}">
      <span class="next-title">${nextProject.title}</span>
      <span class="next-arrow">→</span>
    </a>
  </div>`;

  root.innerHTML = `
    <div class="work-hero">
      <div class="work-meta">
        <span class="work-brand">${project.brand}</span>
        ${project.award ? `<span class="work-award-pill">${project.award}</span>` : ''}
      </div>
      <h1 class="work-title">${project.title}</h1>
      <p class="work-subtitle">${project.subtitle}</p>
      <div class="work-tags">${project.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
    <div class="work-content">
      <div class="desc-block">
        <p class="desc-text">${project.fullDescription}</p>
      </div>
      ${videoHTML}
      ${colHTML}
    </div>
    ${nextHTML}`;
}

function extractYouTubeId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
</script>
</body>
</html>
