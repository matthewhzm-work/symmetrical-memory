<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 40" fill="currentColor">
  <!-- Pencil: eraser -->
  <rect x="4" y="2" width="13" height="5" rx="1.5" opacity="0.55"/>
  <!-- Ferrule -->
  <rect x="3" y="7" width="15" height="3.5"/>
  <!-- Body -->
  <rect x="4" y="10.5" width="13" height="18.5"/>
  <!-- Wood tip -->
