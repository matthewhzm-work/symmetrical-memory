<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 40" fill="currentColor">
  <!-- Pencil: eraser -->
  <rect x="5" y="2" width="11" height="4" rx="1.5" opacity="0.55"/>
  <!-- Ferrule -->
  <rect x="4" y="6" width="13" height="3"/>
  <!-- Body -->
  <rect x="5" y="9" width="11" height="20"/>
  <!-- Wood tip -->
  <polygon points="5,29 16,29 16,33 5,33" opacity="0.45"/>
  <!-- Point -->
  <polygon points="5,33 16,33 10.5,40"/>
  <!-- Wordmark stacked -->
  <text x="28" y="17" font-family="sans-serif" font-weight="700" font-size="10.5" letter-spacing="2">THE</text>
  <text x="28" y="30" font-family="sans-serif" font-weight="700" font-size="10.5" letter-spacing="2">ONE SHOW</text>
</svg>
